<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Gaegu:wght@700&display=swap');

:root{
  --bg: #f0f9ff;
  --surface: rgba(255,255,255,0.75);
  --accent1: #38bdf8;
  --accent2: #818cf8;
  --text: #1e293b;
  --subtext: #94a3b8;
  --radius: 20px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(186,230,255,0.55), transparent),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(196,181,253,0.4), transparent);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 0;
  z-index:50;
}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:999px;
  padding:7px 14px;
  font-weight:700;font-size:.85rem;color:var(--subtext);
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.pill-val{font-size:1.1rem;color:var(--text);font-weight:900;}
.pill-fire{color:#f97316;}

/* ── TITLE ── */
.title-wrap{text-align:center;margin-bottom:22px;}
h1{
  font-family:'Gaegu',cursive;
  font-size:clamp(1.6rem,6vw,2.2rem);
  color:var(--text);
  letter-spacing:-0.5px;
  line-height:1;
}
.sub{
  font-size:.88rem;font-weight:600;
  color:var(--subtext);
  margin-top:3px;
  letter-spacing:0.02em;
}

/* ── SCENE ── */
.scene{
  position:relative;width:260px;height:260px;
  cursor:pointer;touch-action:none;
  filter:drop-shadow(0 16px 32px rgba(56,189,248,0.22)) drop-shadow(0 4px 8px rgba(0,0,0,0.08));
}
#cv{position:absolute;inset:0;}
#piecesDiv{position:absolute;inset:0;pointer-events:none;overflow:visible;}

/* hold ring */
#holdRing{
  position:absolute;inset:-10px;
  width:280px;height:280px;
  pointer-events:none;
}

/* ── STATUS ── */
.status-wrap{margin-top:20px;text-align:center;height:2rem;}
.status{
  font-size:1.05rem;font-weight:700;
  color:var(--text);
  display:inline-block;
  transition:opacity .15s;
}
.hint{font-size:.78rem;color:var(--subtext);margin-top:4px;font-weight:600;}

/* ── CONTROLS ── */
.controls{
  display:flex;gap:10px;margin-top:22px;
  flex-wrap:wrap;justify-content:center;
  max-width:320px;
}
.btn{
  font-family:'Nunito',sans-serif;
  font-size:.88rem;font-weight:800;
  padding:11px 20px;
  border-radius:14px;border:none;cursor:pointer;
  transition:transform .12s,box-shadow .12s,filter .12s;
  letter-spacing:0.01em;
}
.btn:active{transform:scale(.93)!important;filter:brightness(.95);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.12);}

.btn-freeze{
  background:linear-gradient(135deg,#bae6fd,#38bdf8);
  color:#0c4a6e;
  box-shadow:0 4px 12px rgba(56,189,248,.3);
}
.btn-reset{
  background:linear-gradient(135deg,#fed7aa,#fb923c);
  color:#7c2d12;
  box-shadow:0 4px 12px rgba(251,146,60,.3);
}
.btn-flavor{
  background:linear-gradient(135deg,#e9d5ff,#a78bfa);
  color:#3b0764;
  box-shadow:0 4px 12px rgba(167,139,250,.3);
}
.btn-share{
  background:linear-gradient(135deg,#bbf7d0,#34d399);
  color:#064e3b;
  box-shadow:0 4px 12px rgba(52,211,153,.3);
}

/* ── FLASH ── */
#flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;transition:opacity .07s;z-index:999;}
#pts{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.pt{position:absolute;pointer-events:none;}

/* ── ONBOARDING ── */
#onboarding{
  position:fixed;inset:0;
  background:rgba(15,23,42,0.6);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;gap:12px;
}
#onboarding.gone{display:none;}
.ob-card{
  background:white;border-radius:28px;
  padding:36px 32px;max-width:300px;width:88%;
  display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,0.25);
}
.ob-emoji{font-size:3rem;animation:obBounce 1.3s ease-in-out infinite;}
@keyframes obBounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(14px) scale(0.88);}}
.ob-title{font-family:'Gaegu',cursive;font-size:1.7rem;color:#1e293b;}
.ob-sub{font-size:.95rem;color:#64748b;line-height:1.55;font-weight:600;}
.ob-btn{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  padding:14px 36px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  color:white;cursor:pointer;
  box-shadow:0 6px 20px rgba(56,189,248,.35);
  margin-top:4px;transition:transform .12s;
}
.ob-btn:active{transform:scale(.95);}

/* ── UNLOCK TOAST ── */
#unlockToast{
  position:fixed;top:76px;left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:white;border-radius:16px;padding:12px 20px;
  box-shadow:0 8px 28px rgba(0,0,0,0.14);
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity .28s,transform .28s;
  z-index:400;pointer-events:none;
  border:1px solid rgba(0,0,0,0.05);
}
#unlockToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ut-emoji{font-size:1.8rem;}
.ut-text{font-size:.9rem;font-weight:800;color:#1e293b;}

/* ── SHARE MODAL ── */
#shareModal{
  display:none;position:fixed;inset:0;
  background:rgba(15,23,42,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;z-index:500;
}
#shareModal.open{display:flex;}
.share-card{
  background:white;border-radius:28px;padding:32px 28px;
  max-width:290px;width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,0.2);
  display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;
}
.share-emoji{font-size:3rem;}
.share-title{font-family:'Gaegu',cursive;font-size:1.5rem;color:#1e293b;}
.share-stat{font-size:.92rem;color:#64748b;line-height:1.7;font-weight:600;}
.share-stat strong{color:#1e293b;font-size:1.15rem;font-weight:900;}
.share-close{font-size:.85rem;color:#94a3b8;cursor:pointer;font-weight:700;margin-top:2px;}

/* ── FLAVOR POPUP ── */
.popup{
  display:none;position:fixed;inset:0;
  background:rgba(15,23,42,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;z-index:200;
}
.popup.open{display:flex;}
.popup-box{
  background:white;border-radius:24px;padding:24px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:310px;width:92%;
  box-shadow:0 20px 60px rgba(0,0,0,0.18);
  border:1px solid rgba(0,0,0,0.04);
}
.popup-title{
  grid-column:1/-1;font-weight:900;font-size:1.05rem;
  color:#1e293b;text-align:center;margin-bottom:2px;
}
.fi{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 6px;border-radius:14px;cursor:pointer;
  border:2px solid transparent;transition:background .12s,transform .1s,border-color .12s;
  position:relative;
}
.fi:hover{background:#f8fafc;transform:scale(1.05);}
.fi.sel{border-color:#38bdf8;background:#f0f9ff;}
.fi.locked{opacity:0.4;cursor:default;}
.fi .em{font-size:1.8rem;}
.fi .nm{font-size:.72rem;color:#64748b;font-weight:700;}
.fi .lock{position:absolute;top:4px;right:4px;font-size:.65rem;}
</style>
</head>
<body>

<div id="flash"></div>
<div id="pts"></div>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-card">
    <div class="ob-emoji">👆</div>
    <div class="ob-title">왁뿌볼 🫧</div>
    <div class="ob-sub">꾹 눌러서<br>왁스를 부숴봐요!</div>
    <button class="ob-btn" onclick="dismissOnboarding()">해볼게요!</button>
  </div>
</div>

<!-- UNLOCK TOAST -->
<div id="unlockToast">
  <div class="ut-emoji" id="utEmoji"></div>
  <div class="ut-text" id="utText"></div>
</div>



<!-- TOP BAR -->
<div class="topbar">
  <div class="pill">
    <span class="pill-fire">🔥</span>
    연속&nbsp;<span class="pill-val" id="streakNum">0</span>
  </div>
  <div class="pill">
    오늘&nbsp;<span class="pill-val" id="cnt">0</span>
  </div>
</div>

<!-- MAIN -->
<div class="title-wrap">
  <h1>왁뿌볼 🫧</h1>
  <p class="sub">꾹 눌러서 우그작~</p>
</div>

<div class="scene" id="scene">
  <svg id="holdRing" viewBox="0 0 280 280" style="position:absolute;inset:-10px;width:280px;height:280px;pointer-events:none;">
    <circle cx="140" cy="140" r="128" fill="none" stroke="rgba(226,232,240,0.8)" stroke-width="4"/>
    <circle id="holdRingPath" cx="140" cy="140" r="128"
      fill="none" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="804" stroke-dashoffset="804"
      stroke="#38bdf8"
      style="transform-origin:140px 140px;transform:rotate(-90deg);transition:stroke-dashoffset 0.05s linear,stroke 0.2s;"/>
  </svg>
  <canvas id="cv" width="260" height="260"></canvas>
  <div id="piecesDiv"></div>
</div>

<div class="status-wrap">
  <div class="status" id="status">꾹 눌러봐! 🤜</div>
</div>
<div class="hint" id="hint">❄️ 얼리면 더 선명해요</div>

<div class="controls">
  <button class="btn btn-freeze" id="freezeBtn" onclick="toggleFreeze()">❄️ 냉동실</button>
  <button class="btn btn-flavor" onclick="openPop()">🎨 향 바꾸기</button>
  <button class="btn btn-reset" onclick="resetBall()">🔄 새 왁뿌볼</button>

</div>

<!-- FLAVOR POPUP -->
<div class="popup" id="popup" onclick="closePop(event)">
  <div class="popup-box">
    <div class="popup-title">향 선택 ✨</div>
    <div class="fi sel" id="fi0" onclick="tryFlavor(0)"><div class="em">🍏</div><div class="nm">청사과</div></div>
    <div class="fi" id="fi1" onclick="tryFlavor(1)"><div class="em">🍓</div><div class="nm">딸기</div></div>
    <div class="fi locked" id="fi2" onclick="tryFlavor(2)"><div class="em">🍇</div><div class="nm">포도</div><div class="lock">🔒</div></div>
    <div class="fi locked" id="fi3" onclick="tryFlavor(3)"><div class="em">🍑</div><div class="nm">복숭아</div><div class="lock">🔒</div></div>
    <div class="fi locked" id="fi4" onclick="tryFlavor(4)"><div class="em">🍋</div><div class="nm">레몬</div><div class="lock">🔒</div></div>
    <div class="fi locked" id="fi5" onclick="tryFlavor(5)"><div class="em">🫐</div><div class="nm">블루베리</div><div class="lock">🔒</div></div>
  </div>
</div>

<script>

// ── FLAVOR DATA ────────────────────────────────────────────────
const FLAVORS=[
  {name:'🍏 청사과',wax:['#b8f5c8','#4ec97a','#2a9050'],mal:['#ffe0a0','#ffbb30','#d08000'],unlock:0},
  {name:'🍓 딸기',  wax:['#ffc8d5','#e85d7a','#c0345a'],mal:['#fffaaa','#f5e040','#c8a000'],unlock:0},
  {name:'🍇 포도',  wax:['#e0c8f5','#9b59b6','#7d3c98'],mal:['#c8f5d0','#4ec97a','#2a9050'],unlock:5},
  {name:'🍑 복숭아',wax:['#ffd5b8','#ff9a6c','#e06030'],mal:['#d0f0ff','#60c0f0','#2080c0'],unlock:10},
  {name:'🍋 레몬',  wax:['#fffac0','#f0c800','#c9a000'],mal:['#ffc8e0','#f060a0','#c02070'],unlock:20},
  {name:'🫐 블루베리',wax:['#c0d4ff','#3c6fcd','#2450a0'],mal:['#ffd0b8','#ff8850','#d04818'],unlock:35},
];

// ── STATE ──────────────────────────────────────────────────────
let crackCount=0,isFrozen=false,crackLevel=0,isCracking=false;
let audioCtx=null;
let pressX=130,pressY=130,pressFactor=0,isPressingDown=false;
let holdRafId=null,pressStart=0,holdProgress=0,lastCrackAt=0;
let py_last=130;
let streakCount=0;
let currentFlavor=0;
let WAX=FLAVORS[0].wax, MALANG=FLAVORS[0].mal;

// ── ELEMENTS ───────────────────────────────────────────────────
const scene=document.getElementById('scene');
const cv=document.getElementById('cv');
const c=cv.getContext('2d');
const statusEl=document.getElementById('status');
const cntEl=document.getElementById('cnt');
const hintEl=document.getElementById('hint');
const freezeBtn=document.getElementById('freezeBtn');
const piecesDiv=document.getElementById('piecesDiv');
const flashEl=document.getElementById('flash');
const streakEl=document.getElementById('streakNum');
const holdRingPath=document.getElementById('holdRingPath');
const W=260,H=260,CX=130,CY=130,R=116;
const RING_CIRC=2*Math.PI*128;

// ── DRAW ───────────────────────────────────────────────────────
function getBallPath(px,py,pf){
  const segs=128,pts=[];
  const pdx=px-CX,pdy=py-CY;
  const pdist=Math.sqrt(pdx*pdx+pdy*pdy)||0.001;
  const pux=pdx/pdist,puy=pdy/pdist;
  for(let i=0;i<=segs;i++){
    const angle=(i/segs)*Math.PI*2;
    const ux=Math.cos(angle),uy=Math.sin(angle);
    const dot=ux*pux+uy*puy;
    let r=R;
    if(pf>0){
      const dw=0.52;
      const gauss=Math.exp(-(1-dot)*(1-dot)/(2*dw*dw));
      const dimple=dot>0?gauss*30*pf:0;
      const bulge=Math.max(0,-dot)**2*pf*7;
      r=R-dimple+bulge;
    }
    pts.push([CX+ux*r,CY+uy*r]);
  }
  return pts;
}

function drawBall(crackLv,frozen,px,py,pf){
  py_last=py;
  c.clearRect(0,0,W,H);

  // shadow
  c.save();
  c.shadowColor='rgba(0,0,0,0.18)';c.shadowBlur=24;c.shadowOffsetY=10+pf*4;
  c.beginPath();c.arc(CX,CY+4,R-pf*8,0,Math.PI*2);
  c.fillStyle='rgba(0,0,0,0.01)';c.fill();
  c.restore();

  const pts=getBallPath(px,py,pf);
  c.save();
  c.beginPath();
  pts.forEach(([x,y],i)=>i===0?c.moveTo(x,y):c.lineTo(x,y));
  c.closePath();c.clip();

  // malang
  const mg=c.createRadialGradient(CX-18,CY-22,8,CX,CY,R);
  mg.addColorStop(0,MALANG[0]);mg.addColorStop(0.5,MALANG[1]);mg.addColorStop(1,MALANG[2]);
  c.fillStyle=mg;c.fillRect(0,0,W,H);

  // wax
  if(!frozen){
    const wg=c.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
    wg.addColorStop(0,WAX[0]);wg.addColorStop(0.42,WAX[1]);wg.addColorStop(1,WAX[2]);
    c.fillStyle=wg;c.globalAlpha=Math.max(0.15,1-crackLv*0.09);c.fillRect(0,0,W,H);c.globalAlpha=1;
  } else {
    const fg=c.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
    fg.addColorStop(0,'#dff2ff');fg.addColorStop(0.38,'#8dcce8');
    fg.addColorStop(0.75,'#48a0d4');fg.addColorStop(1,'#1a68a8');
    c.fillStyle=fg;c.globalAlpha=Math.max(0.15,1-crackLv*0.09);c.fillRect(0,0,W,H);c.globalAlpha=1;
    c.fillStyle='rgba(210,238,255,0.2)';c.fillRect(0,0,W,H);
  }

  // dimple shading
  if(pf>0.04){
    const pdx2=px-CX,pdy2=py-CY,pd=Math.sqrt(pdx2*pdx2+pdy2*pdy2)||1;
    const pu=[pdx2/pd,pdy2/pd];
    const dc=Math.min(pd,R*0.8);
    const dentX=CX+pu[0]*dc*0.7,dentY=CY+pu[1]*dc*0.7;
    const dentR=36*pf+8;
    const dg=c.createRadialGradient(dentX,dentY,0,dentX,dentY,dentR);
    dg.addColorStop(0,`rgba(0,0,0,${0.26*pf})`);
    dg.addColorStop(0.5,`rgba(0,0,0,${0.10*pf})`);
    dg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=dg;c.fillRect(0,0,W,H);
    // rim highlight
    const rg=c.createRadialGradient(dentX,dentY,dentR*0.5,dentX,dentY,dentR*1.15);
    rg.addColorStop(0,'rgba(255,255,255,0)');
    rg.addColorStop(0.65,`rgba(255,255,255,${0.16*pf})`);
    rg.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=rg;c.fillRect(0,0,W,H);
  }

  if(crackLv>0) drawCracks(crackLv,px,py);

  // shine
  const pdx3=px-CX,pdy3=py-CY,pd3=Math.sqrt(pdx3*pdx3+pdy3*pdy3)||1;
  const sOx=pf>0?(pdx3/pd3)*(-10*pf):0,sOy=pf>0?(pdy3/pd3)*(-10*pf):0;
  const sg=c.createRadialGradient(CX-34+sOx,CY-40+sOy,3,CX-8+sOx,CY-10+sOy,R*0.62);
  sg.addColorStop(0,'rgba(255,255,255,0.9)');sg.addColorStop(0.22,'rgba(255,255,255,0.25)');
  sg.addColorStop(0.5,'rgba(255,255,255,0.04)');sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);
  c.restore();
}

// ── RANDOMISED CRACK VORONOI ────────────────────────────────────
let currentCrackPoly=null;
function genCrackPoly(){
  // Generate random Voronoi-ish crack lines from center
  const n=5+Math.floor(Math.random()*3); // 5-7 main cracks
  const angles=[];
  for(let i=0;i<n;i++) angles.push(Math.random()*Math.PI*2);
  angles.sort((a,b)=>a-b);
  const lines=angles.map(a=>{
    const len=R*(0.7+Math.random()*0.35);
    const wobble=(Math.random()-0.5)*0.3;
    return {
      pts:[
        [CX,CY],
        [CX+Math.cos(a+wobble)*len*0.5, CY+Math.sin(a+wobble)*len*0.5],
        [CX+Math.cos(a)*len, CY+Math.sin(a)*len]
      ]
    };
  });
  // add branch cracks
  const branches=angles.slice(0,3).map(a=>{
    const blen=R*(0.3+Math.random()*0.3);
    const ba=a+(Math.random()-0.5)*0.8;
    const startDist=R*(0.3+Math.random()*0.3);
    return {
      pts:[
        [CX+Math.cos(a)*startDist, CY+Math.sin(a)*startDist],
        [CX+Math.cos(ba)*blen, CY+Math.sin(ba)*blen]
      ]
    };
  });
  return [...lines,...branches];
}

function drawCracks(lv,px,py){
  if(!currentCrackPoly) currentCrackPoly=genCrackPoly();
  const n=Math.min(lv,currentCrackPoly.length);
  c.save();
  c.lineCap='round';c.lineJoin='round';
  c.shadowColor='rgba(255,255,255,0.5)';c.shadowBlur=2;
  for(let i=0;i<n;i++){
    const cr=currentCrackPoly[i];
    c.beginPath();
    c.moveTo(cr.pts[0][0],cr.pts[0][1]);
    for(let j=1;j<cr.pts.length;j++) c.lineTo(cr.pts[j][0],cr.pts[j][1]);
    c.strokeStyle=`rgba(255,255,255,${0.88-i*0.04})`;
    c.lineWidth=i<5?2.6:1.5;
    c.stroke();
  }
  c.restore();
}

// ── RANDOMISED WAX PIECES ───────────────────────────────────────
function genPiecePolys(){
  // Random Voronoi-like polygon pieces using crack angles
  const n=6+Math.floor(Math.random()*3);
  const angles=[];
  for(let i=0;i<n;i++) angles.push((i/n)*Math.PI*2+(Math.random()-0.5)*0.4);
  angles.sort((a,b)=>a-b);
  return angles.map((a,i)=>{
    const a2=angles[(i+1)%n];
    const r1=R*(0.55+Math.random()*0.35);
    const r2=R*(0.55+Math.random()*0.35);
    return [
      [0,0],
      [Math.cos(a)*r1, Math.sin(a)*r1],
      [Math.cos((a+a2)/2)*(R*0.9), Math.sin((a+a2)/2)*(R*0.9)],
      [Math.cos(a2)*r2, Math.sin(a2)*r2],
    ];
  });
}

function launchPieces(){
  piecesDiv.innerHTML='';
  const polys=genPiecePolys();
  polys.forEach((shape,i)=>{
    const pc=document.createElement('canvas');
    pc.width=260;pc.height=260;
    pc.style.cssText='position:absolute;inset:0;width:260px;height:260px;';
    piecesDiv.appendChild(pc);
    const p2=pc.getContext('2d');
    p2.save();
    p2.beginPath();p2.arc(CX,CY,R,0,Math.PI*2);p2.clip();
    p2.beginPath();
    shape.forEach(([dx,dy],j)=>{if(j===0)p2.moveTo(CX+dx,CY+dy);else p2.lineTo(CX+dx,CY+dy);});
    p2.closePath();p2.clip();
    if(isFrozen){
      const fg2=p2.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
      fg2.addColorStop(0,'#dff2ff');fg2.addColorStop(0.4,'#8dcce8');fg2.addColorStop(1,'#1a68a8');
      p2.fillStyle=fg2;
    } else {
      const wg2=p2.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
      wg2.addColorStop(0,WAX[0]);wg2.addColorStop(0.42,WAX[1]);wg2.addColorStop(1,WAX[2]);
      p2.fillStyle=wg2;
    }
    p2.fillRect(0,0,W,H);
    const sg2=p2.createRadialGradient(CX-34,CY-40,3,CX-8,CY-10,R*0.6);
    sg2.addColorStop(0,'rgba(255,255,255,0.7)');sg2.addColorStop(0.3,'rgba(255,255,255,0.1)');sg2.addColorStop(1,'rgba(255,255,255,0)');
    p2.fillStyle=sg2;p2.fillRect(0,0,W,H);
    p2.restore();
    // crack edge
    p2.save();
    p2.beginPath();
    shape.forEach(([dx,dy],j)=>{if(j===0)p2.moveTo(CX+dx,CY+dy);else p2.lineTo(CX+dx,CY+dy);});
    p2.closePath();p2.strokeStyle='rgba(255,255,255,0.85)';p2.lineWidth=2;p2.stroke();
    p2.restore();

    const cx2=shape.slice(1).reduce((s,[dx])=>s+dx,0)/(shape.length-1);
    const cy2=shape.slice(1).reduce((s,[,dy])=>s+dy,0)/(shape.length-1);
    const angle=Math.atan2(cy2,cx2);
    const dist=80+Math.random()*100;
    const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist;
    const rot=(Math.random()-0.5)*80;
    const delay=i*12;
    pc.animate([
      {transform:'translate(0,0) rotate(0deg)',opacity:1},
      {transform:`translate(${tx}px,${ty}px) rotate(${rot}deg)`,opacity:0}
    ],{duration:560,delay,easing:'cubic-bezier(0.12,0,0.65,1)',fill:'forwards'});
    setTimeout(()=>pc.remove(),580+delay);
  });
}

function showMalang(){

  const mg=c.createRadialGradient(CX-18,CY-22,8,CX,CY,R);

  c.fillStyle=sg;c.fillRect(0,0,W,H);

// ── AUDIO: LAYERED CRUNCH ──────────────────────────────────────
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playWageujeok(intensity,frozen){
  const ac=getAC(),now=ac.currentTime;
  // 전체 마스터 볼륨: 팡! 느낌은 살리되 전체를 낮춤
  const master=ac.createGain();
  master.gain.value=0.38;
  master.connect(ac.destination);

  // 1. 초기 압박 충격 (쟈~) - 볼륨 낮추고 어택 부드럽게
  const imp=ac.createOscillator();imp.type='sawtooth';
  imp.frequency.setValueAtTime(frozen?120:80,now);
  imp.frequency.exponentialRampToValueAtTime(22,now+0.10);
  const impF=ac.createBiquadFilter();impF.type='lowpass';impF.frequency.value=340;
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0,now);
  impG.gain.linearRampToValueAtTime(0.55*intensity,now+0.008); // 팡 느낌 살리기
  impG.gain.exponentialRampToValueAtTime(0.001,now+0.11);
  imp.connect(impF);impF.connect(impG);impG.connect(master);imp.start(now);imp.stop(now+0.12);

  // 2. 메인 파열 노이즈 - 1.4초로 길게, 볼륨은 낮게
  const bLen=Math.floor(ac.sampleRate*1.4);
  const buf=ac.createBuffer(2,bLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<bLen;i++){
      const t=i/ac.sampleRate;
      const raw=Math.random()*2-1;
      let env;
      if(t<0.02)       env=t/0.02;                          // 빠른 어택
      else if(t<0.15)  env=1-(t-0.02)/0.13*0.3;            // 살짝 감쇠
      else             env=0.7*Math.exp(-(t-0.15)*(frozen?5:3.5)); // 긴 여운
      d[i]=Math.tanh(raw*(frozen?6:4))*env*intensity*(ch===0?1:0.9);
    }
  }
  const nSrc=ac.createBufferSource();nSrc.buffer=buf;
  const lo=ac.createBiquadFilter();lo.type='lowshelf';lo.frequency.value=500;lo.gain.value=7*intensity;
  const mid=ac.createBiquadFilter();mid.type='peaking';mid.frequency.value=2600;mid.Q.value=0.6;mid.gain.value=9*intensity;
  const hi=ac.createBiquadFilter();hi.type='highshelf';hi.frequency.value=5000;hi.gain.value=5*intensity;
  const nG=ac.createGain();
  nG.gain.setValueAtTime(0.48*intensity,now+0.01);
  nG.gain.exponentialRampToValueAtTime(0.001,now+1.4);
  nSrc.connect(lo);lo.connect(mid);mid.connect(hi);hi.connect(nG);nG.connect(master);nSrc.start(now+0.01);

  // 3. 와그작 리듬 스냅 x10 - 고르고 긴 간격, "와그작 와그작 와그작"
  // 각 스냅이 뚜렷이 들리도록 간격을 충분히 벌림
  const snaps=[
    {t:0.03, f:4800, q:0.7, g:0.62, dur:0.10},
    {t:0.13, f:3800, q:0.8, g:0.58, dur:0.10},
    {t:0.24, f:4400, q:0.65,g:0.55, dur:0.10},
    {t:0.36, f:3400, q:0.9, g:0.50, dur:0.10},
    {t:0.48, f:4900, q:0.7, g:0.46, dur:0.10},
    {t:0.61, f:3600, q:0.8, g:0.40, dur:0.10},
    {t:0.74, f:4200, q:0.75,g:0.34, dur:0.10},
    {t:0.87, f:3200, q:0.9, g:0.27, dur:0.10},
    {t:1.00, f:4600, q:0.7, g:0.20, dur:0.10},
    {t:1.13, f:3000, q:1.0, g:0.13, dur:0.10},
  ];
  snaps.forEach(({t,f,q,g,dur})=>{
    const sb=ac.createBuffer(1,Math.floor(ac.sampleRate*(dur+0.02)),ac.sampleRate);
    const sd=sb.getChannelData(0);
    for(let i=0;i<sd.length;i++){
      const tt=i/ac.sampleRate;
      // 두 층: 짧고 날카로운 어택 + 약간 긴 바디
      const n1=(Math.random()*2-1)*Math.exp(-tt*80);
      const n2=(Math.random()*2-1)*Math.exp(-tt*25);
      sd[i]=(n1*0.55+n2*0.45)*(frozen?1.15:1);
    }
    const ss=ac.createBufferSource();ss.buffer=sb;
    const sf=ac.createBiquadFilter();sf.type='bandpass';sf.frequency.value=f;sf.Q.value=q;
    const sf2=ac.createBiquadFilter();sf2.type='peaking';sf2.frequency.value=2400;sf2.Q.value=0.8;sf2.gain.value=6;
    const sg2=ac.createGain();
    sg2.gain.setValueAtTime(g*intensity,now+t);
    sg2.gain.exponentialRampToValueAtTime(0.001,now+t+dur+0.02);
    ss.connect(sf);sf.connect(sf2);sf2.connect(sg2);sg2.connect(master);ss.start(now+t);
  });

  // 4. 말랑이 스퀴시음 - 좀 더 길게
  const sq=ac.createOscillator();sq.type='sine';
  sq.frequency.setValueAtTime(62,now+0.12);sq.frequency.linearRampToValueAtTime(32,now+0.55);
  const sqF=ac.createBiquadFilter();sqF.type='lowpass';sqF.frequency.value=260;
  const sqG=ac.createGain();
  sqG.gain.setValueAtTime(0,now+0.10);
  sqG.gain.linearRampToValueAtTime(0.38*intensity,now+0.18);
  sqG.gain.exponentialRampToValueAtTime(0.001,now+0.58);
  sq.connect(sqF);sqF.connect(sqG);sqG.connect(master);sq.start(now+0.10);sq.stop(now+0.60);

}

function playMiniSnap(lv){
  const ac=getAC(),now=ac.currentTime;
  const b=ac.createBuffer(1,Math.floor(ac.sampleRate*0.075),ac.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/ac.sampleRate;
    d[i]=(Math.random()*2-1)*(Math.exp(-t*65)+Math.exp(-t*22)*0.45);
  }
  const s=ac.createBufferSource();s.buffer=b;
  const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=1800+lv*320;f.Q.value=0.85;
  const f2=ac.createBiquadFilter();f2.type='highshelf';f2.frequency.value=3800;f2.gain.value=7;
  const g=ac.createGain();g.gain.setValueAtTime(0.18+lv*0.045,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.075);
  s.connect(f);f.connect(f2);f2.connect(g);g.connect(ac.destination);s.start(now);
}

// ── HOLD RING ──────────────────────────────────────────────────
function updateRing(p){
  // p: 0..1
  const offset=RING_CIRC*(1-p);
  holdRingPath.style.strokeDashoffset=offset;
  // Color shifts from orange to red as it fills
  if(p>0.01){
    const r=Math.round(255);
    const g2=Math.round(100-p*80);
    holdRingPath.style.stroke=`rgba(${r},${g2},40,${0.7+p*0.3})`;
  } else {
    holdRingPath.style.stroke='rgba(255,100,40,0)';
  }
}

// ── HOLD LOOP ──────────────────────────────────────────────────
function holdLoop(){
  if(!isPressingDown){holdRafId=null;return;}
  const elapsed=(performance.now()-pressStart)/1000;
  const total=isFrozen?0.85:1.55;
  pressFactor=Math.min(1,elapsed/0.20);
  holdProgress=Math.min(1,elapsed/total);

  updateRing(holdProgress);

  const intervals=isFrozen
    ?[0.14,0.28,0.42,0.55,0.66,0.78,0.88]
    :[0.16,0.32,0.48,0.62,0.73,0.83,0.91];

  for(let i=0;i<intervals.length;i++){
    const thr=intervals[i];
    if(holdProgress>=thr && lastCrackAt<thr && !isCracking){
      lastCrackAt=thr;
      if(i===intervals.length-1){triggerFullCrack();return;}
      crackLevel=i+1;
      playMiniSnap(crackLevel);
      if(navigator.vibrate) navigator.vibrate(12);
      const pre=['꽉 쥐어봐! 👊','금이 가고 있어! 🫧','좀 더! 💪','거의 다 됐어! 😤','터지기 직전! 🔥','으득... 💢','지금이야!! 💥'];
      setStatus(pre[Math.min(i,pre.length-1)]);
      spawnParticles(false);
    }
  }

  drawBall(crackLevel,isFrozen,pressX,pressY,pressFactor);
  holdRafId=requestAnimationFrame(holdLoop);
}

function startPress(px,py){
  if(isCracking)return;
  isPressingDown=true;pressX=px;pressY=py;py_last=py;
  pressStart=performance.now();holdProgress=0;lastCrackAt=0;
  cancelAnimationFrame(holdRafId);
  holdRafId=requestAnimationFrame(holdLoop);
}

function endPress(){
  if(!isPressingDown)return;
  isPressingDown=false;cancelAnimationFrame(holdRafId);holdRafId=null;
  updateRing(0);
  const startF=pressFactor,startT=performance.now();
  function spring(){
    const el=(performance.now()-startT)/1000;
    pressFactor=Math.max(0,startF*(1-el/0.22));
    drawBall(crackLevel,isFrozen,pressX,pressY,pressFactor);
    if(pressFactor>0.008)requestAnimationFrame(spring);
    else{pressFactor=0;drawBall(crackLevel,isFrozen,0,0,0);}
  }
  requestAnimationFrame(spring);
}

function triggerFullCrack(){
  isPressingDown=false;cancelAnimationFrame(holdRafId);holdRafId=null;
  pressFactor=0;updateRing(0);
  isCracking=true;crackCount++;cntEl.textContent=crackCount;
  streakCount++;streakEl.textContent=streakCount;
  currentCrackPoly=null; // reset for next ball

  playWageujeok(isFrozen?1.0:0.85,isFrozen);
  setTimeout(()=>{showMalang();launchPieces();},42);

  // shake
  let sf=0;
  const seq=[[3,-2],[-4,3],[2,-3],[-3,2],[1,-1],[0,0]];
  function shake(){
    if(sf>=seq.length){scene.style.transform='';return;}
    const[sx,sy]=seq[sf++];
    scene.style.transform=`translate(${sx}px,${sy}px)`;
    setTimeout(shake,38);
  }
  shake();
  doFlash();spawnParticles(true);
  if(navigator.vibrate) navigator.vibrate([20,8,52,12,40,8,20]);
  setStatus(getMsg());

  // Check unlocks
  checkUnlocks(crackCount);

  setTimeout(()=>{crackLevel=0;isCracking=false;holdProgress=0;lastCrackAt=0;currentCrackPoly=null;drawBall(0,isFrozen,0,0,0);},720);
}

// ── PARTICLES ─────────────────────────────────────────────────
function spawnParticles(full){
  const host=document.getElementById('pts');
  const rect=scene.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const wC=[WAX[0],WAX[1],'rgba(255,255,255,0.88)'];
  const mC=[MALANG[0],MALANG[1],MALANG[2]];
  const n=full?30:6;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=full?(5+Math.random()*18):(3+Math.random()*7);
    const isWax=Math.random()>0.38;
    const col=isWax?wC[Math.floor(Math.random()*wC.length)]:mC[Math.floor(Math.random()*mC.length)];
    const br=isWax?`${Math.random()*25}% ${55+Math.random()*35}% ${Math.random()*25}% ${55+Math.random()*35}%`:'50%';
    p.style.cssText=`width:${sz}px;height:${sz*(isWax?.5+Math.random()*.4:1)}px;left:${cx}px;top:${cy}px;background:${col};border-radius:${br};opacity:1;box-shadow:0 2px 8px rgba(0,0,0,.12);`;
    host.appendChild(p);
    const angle=Math.random()*Math.PI*2;
    const dist=(full?82:25)+Math.random()*(full?148:58);
    const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist;
    const dur=0.46+Math.random()*0.52;
    p.animate([
      {transform:'translate(-50%,-50%) scale(1) rotate(0deg)',opacity:1},
      {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0) rotate(${(Math.random()-.5)*200}deg)`,opacity:0}
    ],{duration:dur*1000,easing:'cubic-bezier(0.1,0,0.6,1)',fill:'forwards'});
    setTimeout(()=>p.remove(),dur*1000+60);
  }
}

  crackLevel=0;isCracking=false;pressFactor=0;holdProgress=0;lastCrackAt=0;currentCrackPoly=null;
  piecesDiv.innerHTML='';drawBall(0,isFrozen,0,0,0);
  hintEl.textContent='❄️ 얼리면 더 선명해요';
  setStatus('새 왁뿌볼이야! 눌러봐 🤜');
}

// ── ONBOARDING ─────────────────────────────────────────────────
function dismissOnboarding(){
  document.getElementById('onboarding').classList.add('gone');
  // Auto-demo: animate a press after dismissal
  setTimeout(()=>demoPress(),400);
}
function demoPress(){
  if(isCracking)return;
  let t=0;
  const DEMO_X=CX,DEMO_Y=CY+20;
  pressX=DEMO_X;pressY=DEMO_Y;py_last=DEMO_Y;
  const dur=600;
  function step(){
    t+=16;
    const prog=Math.min(t/dur,1);
    const pf=prog<0.5?prog*2:(1-prog)*2;
    pressFactor=pf;
    drawBall(0,isFrozen,DEMO_X,DEMO_Y,pf);
    if(prog<1)requestAnimationFrame(step);
    else{pressFactor=0;drawBall(0,isFrozen,0,0,0);setStatus('이렇게 꾹 눌러봐! 🤜');}
  }
  requestAnimationFrame(step);
}

// ── INIT ───────────────────────────────────────────────────────
drawBall(0,false,0,0,0);

</script>
